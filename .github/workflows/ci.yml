name: CI

on:
  pull_request:
  push:
   branches:
     - main
  schedule:
    # Prime the caches every Monday
    - cron: 0 1 * * MON

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # - windows-latest
          # It seems like dune 3.8 isn't available under opam-repository-mingw for Windows
          # disabling this for now

        ocaml-compiler:
          - 5.1.x

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

      - name: Test
        run: make test

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use OCaml 5.1.x
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.x

      - name: Install dependencies
        run: make install

      - name: Install dune-release
        run: opam install dune-release -y

      - name: Release
        uses: davesnx/dune-release-action@v0.2.14
        with:
          packages: 'melange-testing-library'
          changelog: './CHANGES.md'
          github-token: ${{ secrets.GITHUB_TOKEN }}
